cubes:
  - name: orders_hv
    sql: SELECT * FROM orders_hv
    
    dimensions:
      - name: order_id
        sql: order_id
        type: string
        primaryKey: true
        
      - name: customer_name
        sql: customer_name
        type: string
        
      - name: customer_email
        sql: customer_email
        type: string
        
      - name: product_name
        sql: product_name
        type: string
        
      - name: product_category
        sql: product_category
        type: string
        
      - name: product_sub_category
        sql: product_sub_category
        type: string
        
      - name: order_status
        sql: order_status
        type: string
        
      - name: shipping_address
        sql: shipping_address
        type: string
        
      - name: payment_method
        sql: payment_method
        type: string
        
      - name: payment_sub_type
        sql: payment_sub_type
        type: string
        
      - name: order_date
        sql: order_date
        type: time
        
      - name: delivery_date
        sql: delivery_date
        type: time
        
    measures:
      - name: quantity_total
        sql: quantity
        type: sum
        
      - name: total_amount_sum
        sql: total_amount
        type: sum
        
      - name: average_unit_price
        sql: unit_price
        type: avg
        
      - name: count
        type: count
