services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 admin password; mc mb -p local/warehouse; exit 0; "

  quicksilver-cube:
    build:
      context: . # repo root — both quicksilver-container/ and cube/ are accessible
      dockerfile: quicksilver-cube/Dockerfile
    container_name: quicksilver-cube
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: "duckdb"
      CUBEJS_DB_DUCKDB_DATABASE_PATH: "/duckdb/orders.db"
      MINIO_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "admin"
      S3_SECRET_KEY: "password"
    volumes:
      - ./duckdb:/duckdb # shared between quicksilver (write) and cube (read)
      - ./parquet-data:/parquet-data
    depends_on:
      create-bucket:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      quicksilver-cube:
        condition: service_started

volumes:
  minio_data:
  metabase_data:
