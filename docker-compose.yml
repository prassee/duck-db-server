services:
  ducklake-catalog:
    image: postgres:16-alpine
    container_name: ducklake-catalog
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ducklake_metadata
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - myduck-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: pgsty/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
      - .:/minio
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data --console-address :9001
    networks:
      - myduck-net

  metabase:
    build: .
    depends_on:
      ducklake-catalog:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xmx3g -Xms1g
      # Metabase internal app DB — H2 file stored in the bind-mounted directory
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      # DuckDB community driver location
      MB_PLUGINS_DIR: /plugins
    ports:
      - "3000:3000"
    volumes:
      - ./plugins:/plugins
      - metabase-data:/metabase-data
      - duckdb-data:/duckdb-data
      - ./duckgres-data/extensions:/root/.duckdb/extensions:ro
    # tmpfs with exec allows DuckDB to extract and load its native .so library
    tmpfs:
      - /tmp:rw,exec,mode=1777
    networks:
      - myduck-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

volumes:
  minio-data:
  pgdata:
  metabase-data:
  duckdb-data:


networks:
  myduck-net:
