services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 admin password; mc mb -p local/warehouse; exit 0; "

  cube:
    image: cubejs/cube:latest
    container_name: cube
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: "duckdb"
      CUBEJS_DB_DUCKDB_DATABASE_PATH: "/duckdb/orders.db"
      # cube.js driverFactory reads this path and bootstraps the schema on startup
    volumes:
      - ./cube:/cube/conf # mounts cube/cube.js as /cube/conf/cube.js
      - ./duckdb:/duckdb
    depends_on:
      create-bucket:
        condition: service_completed_successfully

volumes:
  minio_data:
