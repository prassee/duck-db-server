services:
  myduck:
    image: apecloud/myduckserver:latest
    ports:
      - "3306:3306"
      - "5432:5432"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: myduck-backup
      MINIO_SSL: "false"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - .:/myduck
      - ./parquet-data:/parquet-data
      - ./init.sql:/docker-entrypoint-initdb.d/postgres/init.sql
    networks:
      - myduck-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  minio:
    image: pgsty/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
      - .:/minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data --console-address :9001
    networks:
      - myduck-net

volumes:
  minio-data:

networks:
  myduck-net:
