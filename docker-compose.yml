services:
  ducklake-catalog:
    image: postgres:16-alpine
    container_name: ducklake-catalog
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ducklake_metadata
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - myduck-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: pgsty/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
      - .:/minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data --console-address :9001
    networks:
      - myduck-net

  metabase:
    build: .
    depends_on:
      ducklake-catalog:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      JAVA_OPTS: -Xmx3g -Xms1g
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ducklake
      MB_DB_PORT: "5432"
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_DB_HOST: duckgres
    ports:
      - "3000:3000"
    volumes:
      - ./plugins:/plugins
      - ./metabase-data:/metabase-data
    # tmpfs ensures DuckDB can extract native libraries to RAM without permission errors
    tmpfs:
      - /tmp:rw,mode=1777
    networks:
      - myduck-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

volumes:
  minio-data:
  metabase-data:
  pgdata:

networks:
  myduck-net:
